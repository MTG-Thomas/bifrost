[tool.ruff]
target-version = "py311"
line-length = 88
force-exclude = true
exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  "node_modules",
  "dist",
  "build",
  "coverage",
  ".pytest_cache",
  ".mypy_cache",
  ".ruff_cache",
  "alembic/versions",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = false

[tool.pytest.ini_options]
addopts = "--cov=api --cov-report=term-missing --cov-report=xml --cov-report=html"
testpaths = ["api/tests"]
pythonpath = ["api"]
asyncio_mode = "auto"
